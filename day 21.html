 <!DOCTYPE html>
<html>
<head>
    <title>Big Button </title>
    <style>
        body {
            background: #0a192f;
            text-align: center;
            padding-top: 100px;
        }

        button {
            background: transparent;
            color: #64ffda;
            border: 2px solid #64ffda;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #64ffda;
            color: #0a192f;
            transform: scale(2.1);
        }
    </style>
</head>
<body>
    <button>Click me to see a MAGIC
    </button>
</body>
</html>
