<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #f0f0f0;
      font-family: Arial;
    }
    
    h1 {
      text-align: center;
    }

    .gallery {
      display: grid;               /* 1. Grid ON kar diya */
      grid-template-columns: 1fr 1fr 1fr; /* 2. 3 Column bana do barabar */
      gap: 15px;                   /* 3. Dabbo ke beech gap */
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .photo {
      background: dodgerblue;
      color: white;
      height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      border-radius: 8px;
    }

    /* Phone ke liye: 3 column se 1 column bana do */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr; /* Mobile me 1 hi line */
      }
    }
  </style>
</head>
<body>

  <h1>Meri Photo Gallery</h1>

  <div class="gallery">
    <div class="photo">1</div>
    <div class="photo">2</div>
    <div class="photo">3</div>
    <div class="photo">4</div>
    <div class="photo">5</div>
    <div class="photo">6</div>
    <div class="photo">7</div>
    <div class="photo">8</div>
    <div class="photo">9</div>
    <div class="photo">10</div>
    <div class="photo">11</div>
    <div class="photo">12</div>
  </div>

</body>
</html>
