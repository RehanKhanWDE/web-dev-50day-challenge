<!DOCTYPE html>
<html>
<head>
<script language="JavaScript">

function green()
{
    document.bgColor = "#64ffda"; // light green
}

function white()
{
    document.bgColor = "red"; 
}

</script>
</head>

<body>

<form name="f1">
<input type="button" value="Green" onClick="green()">
<input type="button" value="Red" onClick="white()">
</form>

</body>
</html>
