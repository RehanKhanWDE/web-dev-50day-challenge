<!DOCTYPE html>
<html>
<head>
<script language="JavaScript">

function red()
{
    document.bgColor = "#FF0000"; // Red ka code
}

function yellow()
{
    document.bgColor = "#FFFF00"; // Yellow ka code
}

function blue()
{
    document.bgColor = "#0000FF"; // Blue ka code
}

function pink()
{
    document.bgColor = "#FFC0CB"; // Pink ka code
}

function white()
{
    document.bgColor = "white"; // Reset karne ke liye
}

</script>
</head>

<body>

<center>
<h2>Color Changer</h2>
<form name="f1">
<input type="button" value="Red" onClick="red()">
<input type="button" value="Yellow" onClick="yellow()">
<input type="button" value="Blue" onClick="blue()">
<input type="button" value="Pink" onClick="pink()">
<input type="button" value="Reset" onClick="white()">
</form>
</center>

</body>
</html>
