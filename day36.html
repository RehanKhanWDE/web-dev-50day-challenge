<!DOCTYPE html>
<html>
<head>
<script>
function calc()
{
    var a = parseInt(form1.t1.value);
    var b = parseInt(form1.t2.value);
    
    document.write("Addition = " + (a + b) + "<br>");
    document.write("Multiplication = " + (a * b) + "<br>");
    document.write("Division = " + (a / b) + "<br>");
    document.write("subtraction = " + (a - b));
}
</script>
</head>

<body>
<form name="form1">
Enter 1st no: <input name="t1"><br><br>
Enter 2nd no: <input name="t2"><br><br>
<input type="button" value="Calculate" onmouseover="calc()">
</form>
</body>
</html>
