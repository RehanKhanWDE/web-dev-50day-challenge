<!DOCTYPE html>
<html>
<head>
<script>
function calc(op)
{
    var a = document.getElementById("n1").value;
    var b = document.getElementById("n2").value;
    
    // Day 37: Check karna ki khali to nahi hai
    if(a == "" || b == "")
    {
        alert("Bhai dono box me number daal 😡");
        return;
    }
    
    a = Number(a);
    b = Number(b);
    var c;
    
    if(op == "+") c = a + b;
    if(op == "-") c = a - b;
    if(op == "*") c = a * b;
    if(op == "/") c = a / b;
    
    alert("Jawab = " + c);
}
</script>
</head>
<body>
<center>
<h2>Day 37 Calculator</h2>
<input type="number" id="n1" placeholder="Pehla number">
<br><br>
<input type="number" id="n2" placeholder="Dusra number">
<br><br>
<button onclick="calc('+')">+</button>
<button onclick="calc('-')">-</button>
<button onclick="calc('*')">*</button>
<button onclick="calc('/')">/</button>
</center>
</body>
</html>
