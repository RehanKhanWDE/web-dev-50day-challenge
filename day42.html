<!DOCTYPE html>
<html>
<head><title>day 42</title>
<script>
function cF()
{
    var name = document.getElementById("name").value; // box ka value lo
    
    // NAYA: agar khali hai to
    if(name == "" || name == null)
    {
        alert("Bhai naam khali hai! Kuch likh 😡");
    }
    else
    {
        alert("Wah " + name + "! Form submit ho gaya ✅");
    }
}
</script>
</head>
<body>
<center>
<h2>Day 42: Form Validation</h2>

<input type="text" id="name" placeholder="Apna naam likh"> 
<br><br>
<button onclick="cF()">Submit</button>

</center>
</body>
</html>
