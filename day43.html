<!DOCTYPE html>
<html>
<head>
<script>
function changeImage()
{
    // NAYA: image ka src badal do
    document.getElementById("pic").src = "https://picsum.photos/300/200";
}
</script>
</head>
<body>
<center>
<h2>Day 43: Image Change</h2>

<img id="pic" src="https://picsum.photos/200/200" width="200" height="200">
<br><br>
<button onclick="changeImage()">Photo Badlo</button>

</center>
</body>
</html>
